services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cryoguard-backend
    image: cryoguard-backend:latest
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SERVER_PORT=8080
      - SPRING_DATASOURCE_URL=jdbc:h2:file:/opt/h2-data/cryoguard
      - SPRING_DATASOURCE_DRIVERCLASSNAME=org.h2.Driver
      - SPRING_DATASOURCE_USERNAME=sa
      - SPRING_DATASOURCE_PASSWORD=
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - SPRING_H2_CONSOLE_ENABLED=true
      - SPRING_H2_CONSOLE_PATH=/h2-console
      - AUTHORIZATION_JWT_SECRET=cryoguard-256-bit-secret-key-for-jwt-token-signing-must-be-long-enough
      - AUTHORIZATION_JWT_EXPIRATION_DAYS=7
    volumes:
      - h2-data:/opt/h2-data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

volumes:
  h2-data:
    driver: local
