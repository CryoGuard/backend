services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cryoguard-backend
    expose:
      - "8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SERVER_PORT=8080
      - SPRING_DATASOURCE_URL=jdbc:h2:file:/opt/h2-data/cryoguard
      - SPRING_DATASOURCE_DRIVERCLASSNAME=org.h2.Driver
      - SPRING_DATASOURCE_USERNAME=sa
      - SPRING_DATASOURCE_PASSWORD=
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - SPRING_H2_CONSOLE_ENABLED=true
      - SPRING_H2_CONSOLE_PATH=/h2-console
      - AUTHORIZATION_JWT_SECRET=cryoguard-256-bit-secret-key-for-jwt-token-signing-must-be-long-enough
      - AUTHORIZATION_JWT_EXPIRATION_DAYS=7
      - TZ=America/Lima
    volumes:
      - h2-data:/opt/h2-data
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend.rule=Host(`cryoguard-backend-o6gdt2-ccbfdb-147-93-112-175.sslip.io`)"
      - "traefik.http.routers.backend.entrypoints=websecure"
      - "traefik.http.routers.backend.tls=true"
      - "traefik.http.services.backend.loadbalancer.server.port=8080"

volumes:
  h2-data:
    driver: local